[profile.default]
src = "src"
out = "out"
libs = ["lib"]
rpc_endpoints = {sepolia-eth = "" , arb-sepolia = ""}
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@ccip/contracts/=lib/chainlink-ccip/chains/evm/contracts/",
    "@chainlink/contracts/=lib/chainlink-evm/contracts/",
    "lib/chainlink-ccip/:@openzeppelin/contracts@4.8.3/=lib/openzeppelin-contracts-4.8.3/contracts/",
    "lib/chainlink-ccip/:@openzeppelin/contracts@5.0.2/=lib/openzeppelin-contracts-5.0.2/contracts/",
    "src/:@openzeppelin/contracts@4.8.3/=lib/openzeppelin-contracts-4.8.3/contracts/"
]